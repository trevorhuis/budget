services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: budget-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/budget
      BETTER_AUTH_SECRET: Fv0AXmdnYNR2pIEMQipn2LXBLZr3XpVv
      BETTER_AUTH_URL: http://localhost:3000
    ports:
      - '3000:3000'

  postgres:
    image: postgres:17-alpine
    container_name: budget-postgres
    environment:
      POSTGRES_DB: budget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-budget}' ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
